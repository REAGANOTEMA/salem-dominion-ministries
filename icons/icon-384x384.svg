<svg width="384" height="384" viewBox="0 0 384 384" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Rounded background -->
  <rect width="384" height="384" rx="96" ry="96" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Church building -->
  <g transform="translate(192, 192)">
    <!-- Main building -->
    <rect x="-60" y="-30" width="120" height="90" fill="#1e293b" opacity="0.9"/>
    
    <!-- Roof -->
    <polygon points="-70,-30 0,-90 70,-30" fill="#1e293b" opacity="0.9"/>
    
    <!-- Tower -->
    <rect x="-15" y="-90" width="30" height="60" fill="#1e293b"/>
    
    <!-- Cross on top -->
    <rect x="-3" y="-105" width="6" height="30" fill="#1e293b"/>
    <rect x="-11" y="-99" width="22" height="6" fill="#1e293b"/>
    
    <!-- Door -->
    <rect x="-15" y="15" width="30" height="45" fill="#0f172a" opacity="0.7"/>
    
    <!-- Windows -->
    <rect x="-45" y="-15" width="15" height="15" fill="#f59e0b" opacity="0.8"/>
    <rect x="30" y="-15" width="15" height="15" fill="#f59e0b" opacity="0.8"/>
    <rect x="-7" y="-60" width="14" height="14" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Text "SDM" -->
  <text x="192" y="330" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#1e293b">SDM</text>
</svg>
