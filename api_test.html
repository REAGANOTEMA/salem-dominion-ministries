<!DOCTYPE html>
<html>
<head>
    <title>API Test - Salem Dominion Ministries</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>API Test for Salem Dominion Ministries</h1>

    <button onclick="testHealth()">Test Health Endpoint</button>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testRegister()">Test Register</button>

    <div id="results"></div>

    <script>
        function addResult(title, content, isSuccess) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'test ' + (isSuccess ? 'success' : 'error');
            div.innerHTML = `<h3>${title}</h3><pre>${content}</pre>`;
            results.appendChild(div);
        }

        async function testHealth() {
            try {
                const response = await fetch('/salem-dominion-ministries/api/health');
                const data = await response.text();
                addResult('Health Check', `Status: ${response.status}\n${data}`, response.ok);
            } catch (error) {
                addResult('Health Check', `Error: ${error.message}`, false);
            }
        }

        async function testLogin() {
            try {
                const response = await fetch('/salem-dominion-ministries/api/auth?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@salemdominionministries.org',
                        password: 'admin123'
                    })
                });
                const data = await response.text();
                addResult('Login Test', `Status: ${response.status}\n${data}`, response.ok);
            } catch (error) {
                addResult('Login Test', `Error: ${error.message}`, false);
            }
        }

        async function testRegister() {
            try {
                const response = await fetch('/salem-dominion-ministries/api/auth?action=register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        first_name: 'Test',
                        last_name: 'User',
                        email: 'test@example.com',
                        phone: '+256700000000',
                        password: 'test123'
                    })
                });
                const data = await response.text();
                addResult('Register Test', `Status: ${response.status}\n${data}`, response.ok);
            } catch (error) {
                addResult('Register Test', `Error: ${error.message}`, false);
            }
        }
    </script>
</body>
</html>
