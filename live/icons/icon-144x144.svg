<svg width="144" height="144" viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="144" height="144" rx="36" ry="36" fill="url(#bgGradient)"/>
  
  <!-- Church building -->
  <g transform="translate(72, 72)">
    <!-- Main building -->
    <rect x="-22" y="-11" width="44" height="33" fill="#1e293b" opacity="0.9"/>
    
    <!-- Roof -->
    <polygon points="-26,-11 0,-34 26,-11" fill="#1e293b" opacity="0.9"/>
    
    <!-- Tower -->
    <rect x="-5.5" y="-34" width="11" height="23" fill="#1e293b"/>
    
    <!-- Cross on top -->
    <rect x="-1.25" y="-39" width="2.5" height="12" fill="#1e293b"/>
    <rect x="-4" y="-36" width="8" height="2.5" fill="#1e293b"/>
    
    <!-- Door -->
    <rect x="-5.5" y="5.5" width="11" height="17" fill="#0f172a" opacity="0.7"/>
    
    <!-- Windows -->
    <rect x="-17" y="-5.5" width="5.5" height="5.5" fill="#f59e0b" opacity="0.8"/>
    <rect x="11.5" y="-5.5" width="5.5" height="5.5" fill="#f59e0b" opacity="0.8"/>
    <rect x="-2.5" y="-23" width="5" height="5" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Text "SDM" -->
  <text x="72" y="124" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e293b">SDM</text>
</svg>
