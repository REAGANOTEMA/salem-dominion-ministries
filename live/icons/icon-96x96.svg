<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="96" height="96" rx="24" ry="24" fill="url(#bgGradient)"/>
  
  <!-- Church building -->
  <g transform="translate(48, 48)">
    <!-- Main building -->
    <rect x="-15" y="-7" width="30" height="22" fill="#1e293b" opacity="0.9"/>
    
    <!-- Roof -->
    <polygon points="-17,-7 0,-22 17,-7" fill="#1e293b" opacity="0.9"/>
    
    <!-- Tower -->
    <rect x="-3.5" y="-22" width="7" height="15" fill="#1e293b"/>
    
    <!-- Cross on top -->
    <rect x="-0.75" y="-26" width="1.5" height="8" fill="#1e293b"/>
    <rect x="-2.5" y="-24" width="5" height="1.5" fill="#1e293b"/>
    
    <!-- Door -->
    <rect x="-3.5" y="3.5" width="7" height="11" fill="#0f172a" opacity="0.7"/>
    
    <!-- Windows -->
    <rect x="-11" y="-3.5" width="3.5" height="3.5" fill="#f59e0b" opacity="0.8"/>
    <rect x="7.5" y="-3.5" width="3.5" height="3.5" fill="#f59e0b" opacity="0.8"/>
    <rect x="-1.5" y="-15" width="3" height="3" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Text "SDM" -->
  <text x="48" y="82" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#1e293b">SDM</text>
</svg>
