<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="128" height="128" rx="32" ry="32" fill="url(#bgGradient)"/>
  
  <!-- Church building -->
  <g transform="translate(64, 64)">
    <!-- Main building -->
    <rect x="-20" y="-10" width="40" height="30" fill="#1e293b" opacity="0.9"/>
    
    <!-- Roof -->
    <polygon points="-23,-10 0,-30 23,-10" fill="#1e293b" opacity="0.9"/>
    
    <!-- Tower -->
    <rect x="-5" y="-30" width="10" height="20" fill="#1e293b"/>
    
    <!-- Cross on top -->
    <rect x="-1" y="-35" width="2" height="10" fill="#1e293b"/>
    <rect x="-3.5" y="-32" width="7" height="2" fill="#1e293b"/>
    
    <!-- Door -->
    <rect x="-5" y="5" width="10" height="15" fill="#0f172a" opacity="0.7"/>
    
    <!-- Windows -->
    <rect x="-15" y="-5" width="5" height="5" fill="#f59e0b" opacity="0.8"/>
    <rect x="10" y="-5" width="5" height="5" fill="#f59e0b" opacity="0.8"/>
    <rect x="-2" y="-20" width="4" height="4" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Text "SDM" -->
  <text x="64" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">SDM</text>
</svg>
