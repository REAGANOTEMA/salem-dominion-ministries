<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Salem Dominion Ministries</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="text-center text-white p-8 max-w-md mx-4">
        <!-- Church Icon -->
        <div class="mb-8">
            <i class="fas fa-church text-6xl mb-4 pulse-animation"></i>
        </div>
        
        <!-- Offline Message -->
        <h1 class="text-3xl font-bold mb-4">You're Offline</h1>
        <p class="text-lg mb-8 opacity-90">
            You're currently offline, but you can still access cached content and some features of Salem Dominion Ministries.
        </p>
        
        <!-- Available Features -->
        <div class="bg-white/10 backdrop-filter backdrop-blur-lg rounded-xl p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">Available Offline</h2>
            <div class="grid grid-cols-2 gap-4 text-left">
                <div class="flex items-center">
                    <i class="fas fa-check-circle text-green-400 mr-2"></i>
                    <span>Previous Sermons</span>
                </div>
                <div class="flex items-center">
                    <i class="fas fa-check-circle text-green-400 mr-2"></i>
                    <span>Service Times</span>
                </div>
                <div class="flex items-center">
                    <i class="fas fa-check-circle text-green-400 mr-2"></i>
                    <span>Contact Info</span>
                </div>
                <div class="flex items-center">
                    <i class="fas fa-check-circle text-green-400 mr-2"></i>
                    <span>Cached Events</span>
                </div>
            </div>
        </div>
        
        <!-- Actions -->
        <div class="space-y-4">
            <button onclick="window.location.reload()" class="w-full py-3 px-4 bg-amber-500 text-gray-900 font-semibold rounded-lg hover:bg-amber-600 transition flex items-center justify-center">
                <i class="fas fa-sync-alt mr-2"></i>
                Try Reconnecting
            </button>
            
            <button onclick="goHome()" class="w-full py-3 px-4 bg-white/20 border border-white/30 text-white font-semibold rounded-lg hover:bg-white/30 transition flex items-center justify-center">
                <i class="fas fa-home mr-2"></i>
                Go to Home
            </button>
        </div>
        
        <!-- Connection Status -->
        <div class="mt-8 p-4 bg-white/10 rounded-lg">
            <div class="flex items-center justify-center">
                <div class="w-3 h-3 bg-red-500 rounded-full mr-2 animate-pulse"></div>
                <span class="text-sm">Offline Mode</span>
            </div>
        </div>
    </div>

    <script>
        // Check connection status periodically
        let isOnline = navigator.onLine;
        
        function updateConnectionStatus() {
            isOnline = navigator.onLine;
            const statusDot = document.querySelector('.bg-red-500');
            const statusText = document.querySelector('.text-sm');
            
            if (isOnline) {
                statusDot.className = 'w-3 h-3 bg-green-500 rounded-full mr-2';
                statusText.textContent = 'Online Mode';
                
                // Auto-redirect when back online
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                statusDot.className = 'w-3 h-3 bg-red-500 rounded-full mr-2 animate-pulse';
                statusText.textContent = 'Offline Mode';
            }
        }
        
        // Listen for connection changes
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        
        // Go to home page
        function goHome() {
            window.location.href = '/';
        }
        
        // Initialize
        updateConnectionStatus();
        
        // Check connection every 5 seconds
        setInterval(updateConnectionStatus, 5000);
    </script>
</body>
</html>
