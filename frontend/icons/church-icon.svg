<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Rounded background -->
  <rect width="512" height="512" rx="128" ry="128" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Church building silhouette -->
  <g transform="translate(256, 256)">
    <!-- Main building -->
    <rect x="-80" y="-40" width="160" height="120" fill="#1e293b" opacity="0.9"/>
    
    <!-- Roof -->
    <polygon points="-100,-40 0,-120 100,-40" fill="#1e293b" opacity="0.9"/>
    
    <!-- Tower -->
    <rect x="-20" y="-120" width="40" height="80" fill="#1e293b"/>
    
    <!-- Cross on top -->
    <rect x="-4" y="-140" width="8" height="40" fill="#1e293b"/>
    <rect x="-15" y="-132" width="30" height="8" fill="#1e293b"/>
    
    <!-- Door -->
    <rect x="-20" y="20" width="40" height="60" fill="#0f172a" opacity="0.7"/>
    
    <!-- Windows -->
    <rect x="-60" y="-20" width="20" height="20" fill="#f59e0b" opacity="0.8"/>
    <rect x="40" y="-20" width="20" height="20" fill="#f59e0b" opacity="0.8"/>
    <rect x="-10" y="-80" width="20" height="20" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Text "SDM" -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#1e293b">SDM</text>
</svg>
