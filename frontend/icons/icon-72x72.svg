<svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="72" height="72" rx="18" ry="18" fill="url(#bgGradient)"/>
  
  <!-- Church building -->
  <g transform="translate(36, 36)">
    <!-- Main building -->
    <rect x="-11" y="-5" width="22" height="17" fill="#1e293b" opacity="0.9"/>
    
    <!-- Roof -->
    <polygon points="-13,-5 0,-17 13,-5" fill="#1e293b" opacity="0.9"/>
    
    <!-- Tower -->
    <rect x="-2.5" y="-17" width="5" height="11" fill="#1e293b"/>
    
    <!-- Cross on top -->
    <rect x="-0.5" y="-20" width="1" height="6" fill="#1e293b"/>
    <rect x="-2" y="-18.5" width="4" height="1" fill="#1e293b"/>
    
    <!-- Door -->
    <rect x="-2.5" y="2.5" width="5" height="9" fill="#0f172a" opacity="0.7"/>
    
    <!-- Windows -->
    <rect x="-8" y="-2.5" width="2.5" height="2.5" fill="#f59e0b" opacity="0.8"/>
    <rect x="5.5" y="-2.5" width="2.5" height="2.5" fill="#f59e0b" opacity="0.8"/>
    <rect x="-1" y="-11" width="2" height="2" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Text "SDM" -->
  <text x="36" y="62" font-family="Arial, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="#1e293b">SDM</text>
</svg>
