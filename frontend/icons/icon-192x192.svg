<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="192" height="192" rx="48" ry="48" fill="url(#bgGradient)"/>
  
  <!-- Church building -->
  <g transform="translate(96, 96)">
    <!-- Main building -->
    <rect x="-30" y="-15" width="60" height="45" fill="#1e293b" opacity="0.9"/>
    
    <!-- Roof -->
    <polygon points="-35,-15 0,-45 35,-15" fill="#1e293b" opacity="0.9"/>
    
    <!-- Tower -->
    <rect x="-7" y="-45" width="14" height="30" fill="#1e293b"/>
    
    <!-- Cross on top -->
    <rect x="-1.5" y="-52" width="3" height="15" fill="#1e293b"/>
    <rect x="-5" y="-49" width="10" height="3" fill="#1e293b"/>
    
    <!-- Door -->
    <rect x="-7" y="7" width="14" height="23" fill="#0f172a" opacity="0.7"/>
    
    <!-- Windows -->
    <rect x="-22" y="-7" width="7" height="7" fill="#f59e0b" opacity="0.8"/>
    <rect x="15" y="-7" width="7" height="7" fill="#f59e0b" opacity="0.8"/>
    <rect x="-3" y="-30" width="6" height="6" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Text "SDM" -->
  <text x="96" y="165" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1e293b">SDM</text>
</svg>
