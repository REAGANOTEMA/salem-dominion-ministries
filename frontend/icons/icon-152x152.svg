<svg width="152" height="152" viewBox="0 0 152 152" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="152" height="152" rx="38" ry="38" fill="url(#bgGradient)"/>
  
  <!-- Church building -->
  <g transform="translate(76, 76)">
    <!-- Main building -->
    <rect x="-24" y="-12" width="48" height="36" fill="#1e293b" opacity="0.9"/>
    
    <!-- Roof -->
    <polygon points="-28,-12 0,-36 28,-12" fill="#1e293b" opacity="0.9"/>
    
    <!-- Tower -->
    <rect x="-6" y="-36" width="12" height="24" fill="#1e293b"/>
    
    <!-- Cross on top -->
    <rect x="-1.5" y="-42" width="3" height="13" fill="#1e293b"/>
    <rect x="-4.5" y="-38.5" width="9" height="3" fill="#1e293b"/>
    
    <!-- Door -->
    <rect x="-6" y="6" width="12" height="18" fill="#0f172a" opacity="0.7"/>
    
    <!-- Windows -->
    <rect x="-18" y="-6" width="6" height="6" fill="#f59e0b" opacity="0.8"/>
    <rect x="12" y="-6" width="6" height="6" fill="#f59e0b" opacity="0.8"/>
    <rect x="-3" y="-24" width="6" height="6" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Text "SDM" -->
  <text x="76" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b">SDM</text>
</svg>
